<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Odanda Gör — Halı Görselleştirici</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="ui-panel">
      <div class="panel-header">
        <h2>Odanda Gör</h2>
        <p class="subtitle">Halını odanda dene</p>
      </div>

      <!-- AR Button -->
      <div class="control-group" id="ar-section">
        <button id="ar-btn" class="btn btn-ar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Odamda Dene (AR)
        </button>
        <p class="ar-hint" id="ar-hint"></p>
      </div>

      <div class="control-group">
        <label>Oda Seçimi</label>
        <div id="room-selector" class="room-grid"></div>
      </div>

      <div class="control-group">
        <label>Halı Görseli</label>
        <div class="carpet-input-row">
          <input type="text" id="carpet-url" placeholder="Halı görsel URL'si yapıştır...">
          <button id="load-carpet-btn" class="btn btn-primary">Yükle</button>
        </div>
        <div class="carpet-upload-row">
          <label for="carpet-file" class="btn btn-secondary btn-full">
            veya Dosya Seç
          </label>
          <input type="file" id="carpet-file" accept="image/*" hidden>
        </div>
      </div>

      <div class="control-group">
        <label>Halı Boyutu</label>
        <div class="size-controls">
          <div class="size-input">
            <span>En:</span>
            <input type="range" id="carpet-width" min="80" max="400" value="200" step="10">
            <span id="carpet-width-val" class="val">200cm</span>
          </div>
          <div class="size-input">
            <span>Boy:</span>
            <input type="range" id="carpet-height" min="100" max="500" value="300" step="10">
            <span id="carpet-height-val" class="val">300cm</span>
          </div>
          <div class="size-presets">
            <button class="btn btn-sm" data-w="120" data-h="170">120×170</button>
            <button class="btn btn-sm" data-w="160" data-h="230">160×230</button>
            <button class="btn btn-sm" data-w="200" data-h="300">200×300</button>
            <button class="btn btn-sm" data-w="250" data-h="350">250×350</button>
            <button class="btn btn-sm" data-w="300" data-h="400">300×400</button>
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>Döndürme</label>
        <div class="rotation-controls">
          <input type="range" id="carpet-rotation" min="0" max="360" value="0" step="1">
          <span id="carpet-rotation-val" class="val">0°</span>
          <div class="rotation-presets">
            <button class="btn btn-sm" data-rot="0">0°</button>
            <button class="btn btn-sm" data-rot="45">45°</button>
            <button class="btn btn-sm" data-rot="90">90°</button>
            <button class="btn btn-sm" data-rot="135">135°</button>
            <button class="btn btn-sm" data-rot="180">180°</button>
            <button class="btn btn-sm" data-rot="270">270°</button>
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>Kamera</label>
        <div class="camera-presets">
          <button class="btn btn-sm" data-cam="front">Önden</button>
          <button class="btn btn-sm" data-cam="angle">Açılı</button>
          <button class="btn btn-sm" data-cam="top">Üstten</button>
          <button class="btn btn-sm" data-cam="low">Alçak</button>
        </div>
      </div>

      <div class="control-group hint">
        <p>🖱️ Fare ile odayı döndür, scroll ile yakınlaş</p>
        <p>👆 Halıyı sürükleyerek konumlandır</p>
      </div>
    </div>

    <!-- AR DOM Overlay (WebXR) -->
    <div id="ar-overlay" class="ar-overlay hidden">
      <div class="ar-hud">
        <p id="ar-status">Zemini tarıyorum... Telefonu yavaşça hareket ettir</p>
        <button id="ar-exit" class="btn btn-ar-exit">✕ Çık</button>
      </div>
    </div>

    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
      <p>Yükleniyor...</p>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
